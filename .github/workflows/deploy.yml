name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Hostinger sering memblokir SSH dari IP GitHub Actions → pakai FTP/FTPS
      - name: Validate FTP host DNS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          HOST="${FTP_HOST}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%%/*}"
          if [ -z "$HOST" ]; then
            echo "::error::FTP_HOST secret kosong"
            exit 1
          fi
          if ! getent hosts "$HOST" > /dev/null; then
            echo "::error::FTP_HOST '$HOST' tidak ditemukan (ENOTFOUND)."
            echo "Ambil hostname/IP yang benar di hPanel → Websites → FTP Accounts."
            echo "Contoh benar: 185.123.45.67  atau  ftp.domain-anda.com"
            echo "Contoh salah: id-dci-web1785  ssh host  https://domain.com"
            exit 1
          fi
          echo "FTP host OK: $HOST"

      - name: Normalize FTP server path
        id: ftp
        env:
          FTP_DIST_DIR: ${{ secrets.FTP_DIST_DIR }}
        run: |
          DIR="${FTP_DIST_DIR}"
          if [ -z "$DIR" ]; then
            echo "::error::FTP_DIST_DIR secret is empty"
            exit 1
          fi
          if [[ "$DIR" != */ ]]; then
            DIR="${DIR}/"
          fi
          echo "dir=${DIR}" >> "$GITHUB_OUTPUT"
          echo "Using server-dir: ${DIR}"

      - name: Upload frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./frontend/dist/
          server-dir: ${{ steps.ftp.outputs.dir }}
          dangerous-clean-slate: true

      - name: Trigger Hostinger git pull
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS -X POST "$WEBHOOK"
            echo "Hostinger git pull triggered."
          else
            echo "HOSTINGER_DEPLOY_WEBHOOK not set — skip."
          fi

      - name: Trigger server deploy hook
        env:
          HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -n "$HOOK_URL" ] && [ -n "$HOOK_TOKEN" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer $HOOK_TOKEN" \
              "$HOOK_URL"
            echo "deploy.sh triggered via HTTP."
          else
            echo "DEPLOY_HOOK_URL not set — jalankan bash scripts/deploy.sh manual di server."
          fi
