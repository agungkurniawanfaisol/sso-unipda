name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Normalize FTP host
        id: ftp_host
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          HOST="$(printf '%s' "$FTP_HOST" | tr -d '[:space:]')"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%%/*}"
          if [ -z "$HOST" ]; then
            echo "::error::FTP_HOST secret kosong"
            exit 1
          fi
          if [[ "$HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "FTP host OK (IP): $HOST"
          elif getent hosts "$HOST" > /dev/null 2>&1; then
            echo "FTP host OK (hostname): $HOST"
          else
            echo "::error::FTP_HOST tidak valid (ENOTFOUND): '$HOST'"
            echo "hPanel → FTP Accounts → FTP IP. Contoh: 46.202.138.30 (tanpa ftp://)"
            exit 1
          fi
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"

      - name: Resolve document root path
        id: ftp
        env:
          FTP_DIST_DIR: ${{ secrets.FTP_DIST_DIR }}
        run: |
          DIR="${FTP_DIST_DIR:-/public_html/}"
          DIR="$(printf '%s' "$DIR" | tr -d '[:space:]')"
          if [[ "$DIR" == */frontend/dist/ ]] || [[ "$DIR" == */frontend/dist ]]; then
            DIR="${DIR%/frontend/dist*}/"
          fi
          if [[ "$DIR" != */ ]]; then
            DIR="${DIR}/"
          fi
          echo "dir=${DIR}" >> "$GITHUB_OUTPUT"
          echo "Publishing to document root: ${DIR}"

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy frontend via FTPS (lftp + retry)
        id: lftp_deploy
        continue-on-error: true
        env:
          FTP_HOST: ${{ steps.ftp_host.outputs.host }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ steps.ftp.outputs.dir }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4; do
            echo "::group::FTPS upload attempt ${attempt}/4"
            if lftp -u "${FTP_USER},${FTP_PASS}" "ftps://${FTP_HOST}:21" <<EOF
          set ftp:ssl-force true
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 2
          set net:reconnect-interval-base 5
          lcd frontend/dist
          cd ${FTP_DIR}
          mirror -R --parallel=2 --verbose
          bye
          EOF
            then
              echo "FTPS upload succeeded on attempt ${attempt}"
              echo "::endgroup::"
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 45s..."
            echo "::endgroup::"
            sleep 45
          done
          echo "::warning::lftp deploy failed after 4 attempts"
          exit 1

      - name: Deploy frontend via FTP-Deploy-Action (fallback FTPS)
        id: ftp_ftps_fallback
        if: steps.lftp_deploy.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp_host.outputs.host }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./frontend/dist/
          server-dir: ${{ steps.ftp.outputs.dir }}
          dangerous-clean-slate: false
          timeout: 300000
          log-level: verbose

      - name: Deploy frontend via plain FTP (last resort)
        id: ftp_plain_fallback
        if: steps.lftp_deploy.outcome == 'failure' && steps.ftp_ftps_fallback.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp_host.outputs.host }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./frontend/dist/
          server-dir: ${{ steps.ftp.outputs.dir }}
          dangerous-clean-slate: false
          timeout: 300000
          log-level: verbose

      - name: Verify deploy succeeded
        run: |
          if [ "${{ steps.lftp_deploy.outcome }}" = "success" ]; then
            echo "Deploy OK (lftp)"
            exit 0
          fi
          if [ "${{ steps.ftp_ftps_fallback.outcome }}" = "success" ]; then
            echo "Deploy OK (FTP-Deploy FTPS)"
            exit 0
          fi
          if [ "${{ steps.ftp_plain_fallback.outcome }}" = "success" ]; then
            echo "Deploy OK (plain FTP)"
            exit 0
          fi
          echo "::error::Semua metode FTP gagal. Cek FTP_HOST (pakai IP 46.202.138.30), username/password, dan apakah Hostinger memblokir IP GitHub Actions."
          exit 1

      - name: Trigger Hostinger git pull
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS -X POST "$WEBHOOK"
            echo "Hostinger git pull triggered."
          else
            echo "HOSTINGER_DEPLOY_WEBHOOK not set — skip."
          fi

      - name: Trigger server deploy hook
        env:
          HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -n "$HOOK_URL" ] && [ -n "$HOOK_TOKEN" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer $HOOK_TOKEN" \
              "$HOOK_URL"
            echo "deploy.sh triggered via HTTP."
          else
            echo "DEPLOY_HOOK_URL not set — skip."
          fi
