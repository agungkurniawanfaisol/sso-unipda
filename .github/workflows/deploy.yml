name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Hostinger sering memblokir SSH dari IP GitHub Actions → pakai FTP
      - name: Upload frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./frontend/dist/
          server-dir: ${{ secrets.FTP_DIST_DIR }}
          dangerous-clean-slate: true

      - name: Trigger Hostinger git pull
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS -X POST "$WEBHOOK"
            echo "Hostinger git pull triggered."
          else
            echo "HOSTINGER_DEPLOY_WEBHOOK not set — skip."
          fi

      - name: Trigger server deploy hook
        env:
          HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -n "$HOOK_URL" ] && [ -n "$HOOK_TOKEN" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer $HOOK_TOKEN" \
              "$HOOK_URL"
            echo "deploy.sh triggered via HTTP."
          else
            echo "DEPLOY_HOOK_URL not set — jalankan bash scripts/deploy.sh manual di server."
          fi
