name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Hostinger memblokir FTP dari IP GitHub Actions → deploy via HTTP webhook
      - name: Deploy via HTTP webhook
        id: http_deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_HOOK_URL}" ] || [ -z "${DEPLOY_HOOK_TOKEN}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HOOK_URL / DEPLOY_HOOK_TOKEN belum diset — skip HTTP deploy."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"
          echo "Packaging frontend/dist..."
          (cd frontend/dist && zip -r -q ../../dist.zip .)

          echo "Uploading to ${DEPLOY_HOOK_URL} ..."
          for attempt in 1 2 3; do
            echo "::group::HTTP deploy attempt ${attempt}/3"
            if curl -fsS --max-time 600 --retry 2 --retry-delay 10 \
              -X POST \
              -H "Authorization: Bearer ${DEPLOY_HOOK_TOKEN}" \
              -H "Content-Type: application/zip" \
              --data-binary @dist.zip \
              "${DEPLOY_HOOK_URL}"; then
              echo ""
              echo "::endgroup::"
              echo "HTTP deploy succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt} failed, waiting 30s..."
            echo "::endgroup::"
            sleep 30
          done

          echo "::error::HTTP deploy gagal setelah 3 percobaan"
          exit 1

      - name: Deploy via FTP (fallback, sering diblokir Hostinger)
        if: steps.http_deploy.outputs.configured != 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIST_DIR: ${{ secrets.FTP_DIST_DIR }}
        run: |
          set -euo pipefail
          if [ -z "${FTP_HOST}" ] || [ -z "${FTP_USERNAME}" ] || [ -z "${FTP_PASSWORD}" ]; then
            echo "::error::Set DEPLOY_HOOK_URL + DEPLOY_HOOK_TOKEN (disarankan), atau FTP secrets."
            echo "Lihat .env.deploy.example untuk setup deploy.php di server."
            exit 1
          fi

          HOST="$(printf '%s' "$FTP_HOST" | tr -d '[:space:]')"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST%%/*}"

          DIR="${FTP_DIST_DIR:-/public_html/}"
          DIR="$(printf '%s' "$DIR" | tr -d '[:space:]')"
          if [[ "$DIR" == */frontend/dist/ ]] || [[ "$DIR" == */frontend/dist ]]; then
            DIR="${DIR%/frontend/dist*}/"
          fi
          [[ "$DIR" == */ ]] || DIR="${DIR}/"

          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" "ftps://${HOST}:21" <<EOF
          set ftp:ssl-force true
          set ssl:verify-certificate no
          set net:timeout 60
          lcd frontend/dist
          cd ${DIR}
          mirror -R --parallel=2
          bye
          EOF
