services:
  # ────────────────────────────
  # MySQL Database
  # ────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: unipda-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: unipda
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: unipda
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────
  # Laravel Backend API (dev mode with auto-reload)
  # ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    container_name: unipda-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: unipda
      DB_USERNAME: unipda
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────
  # React Frontend (dev mode with HMR)
  # ────────────────────────────
  frontend:
    image: node:24-alpine
    container_name: unipda-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    command: sh -c "npm install --silent && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  mysql_data:
