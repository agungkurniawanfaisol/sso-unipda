services:
  # ────────────────────────────
  # MySQL Database
  # ────────────────────────────
  mysql:
    ports:
      - "3306:3306"

  # ────────────────────────────
  # Laravel Backend API (dev mode with auto-reload)
  # ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    container_name: unipda-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: unipda
      DB_USERNAME: unipda
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy

  # ────────────────────────────
  # React Frontend (dev mode with HMR)
  # ────────────────────────────
  frontend:
    image: node:24-alpine
    container_name: unipda-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    command: sh -c "[ -d node_modules ] || npm install --silent && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
